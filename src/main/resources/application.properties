spring.application.name=lumenai-backend
server.port=8080

# ─────────────────────────────────────────────
#  H2 (local dev — file-based so data survives restarts)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/lumenai_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─────────────────────────────────────────────
#  JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:lumenai_secret_key_which_should_be_at_least_256_bits_long_so_make_it_very_long_indeed}
jwt.expirationMs=86400000

# ─────────────────────────────────────────────
#  Email (Gmail SMTP — set spring.mail.enabled=true and supply credentials)
# ─────────────────────────────────────────────
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
lumenai.mail.from=${MAIL_FROM:noreply@lumenai.app}
lumenai.app.url=${APP_URL:http://localhost:5173}

# ─────────────────────────────────────────────────────────────────────────────
#  OpenAI (direct HTTP via OkHttp)
#  Set OPENAI_API_KEY=sk-... to enable real AI features
# ─────────────────────────────────────────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# ─────────────────────────────────────────────
#  Storage (local | cloudinary | s3)
# ─────────────────────────────────────────────
storage.provider=${STORAGE_PROVIDER:local}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# AWS S3
aws.s3.bucket-name=${AWS_S3_BUCKET:lumenai-bucket}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

# ─────────────────────────────────────────────
#  Google Books API
# ─────────────────────────────────────────────
google.books.api.key=${GOOGLE_BOOKS_API_KEY:}

# ─────────────────────────────────────────────
#  File Upload Limits
# ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
