spring.application.name=lumenai-backend
server.port=8080

# ─────────────────────────────────────────────
#  H2 (local dev — file-based so data survives restarts)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/lumenai_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─────────────────────────────────────────────
#  JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:lumenai_secret_key_which_should_be_at_least_256_bits_long_so_make_it_very_long_indeed}
jwt.expirationMs=86400000

lumenai.app.url=${APP_URL:http://localhost:5173}

# ─────────────────────────────────────────────────────────────────────────────
#  OpenAI (direct HTTP via OkHttp)
#  Set OPENAI_API_KEY=sk-... to enable real AI features
# ─────────────────────────────────────────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# ─────────────────────────────────────────────
#  Storage (local | cloudinary | s3)
# ─────────────────────────────────────────────
storage.provider=${STORAGE_PROVIDER:local}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dlia7tbq6}
cloudinary.api-key=${CLOUDINARY_API_KEY:633845769675717}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:UpSlaNLsUdBBjdobtONbH-KYMEY}

# ─────────────────────────────────────────────
#  Google Books API
# ─────────────────────────────────────────────
google.books.api.key=${GOOGLE_BOOKS_API_KEY:AIzaSyBIH1vS6o5_e9-IExNH6ShrJGrlcG6-alk}

# ─────────────────────────────────────────────
#  File Upload Limits
# ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
