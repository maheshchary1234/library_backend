# ─────────────────────────────────────────────
#  PRODUCTION PROFILE (Render / EC2 + Neon / RDS)
#  Set SPRING_PROFILES_ACTIVE=prod in deployment env
# ─────────────────────────────────────────────

# PostgreSQL — use DATABASE_URL env var (Neon/RDS connection string)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Email must be enabled in prod
spring.mail.enabled=true

# Storage must be set in prod (cloudinary or s3)
storage.provider=${STORAGE_PROVIDER:cloudinary}

# File Upload Limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
